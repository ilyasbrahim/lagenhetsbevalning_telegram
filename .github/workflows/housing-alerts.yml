name: Housing Alerts
run-name: Housing Alerts - ${{ github.event_name }}

"on":
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: housing-alerts
  cancel-in-progress: false

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "utc_time=$(date -u)"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Create environment file
        run: |
          cat > .env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Run housing alerts
        run: python main.py

      - name: Commit updated listings database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/listings.db
          git diff --cached --quiet || git commit -m "Update listings database"
          git push
